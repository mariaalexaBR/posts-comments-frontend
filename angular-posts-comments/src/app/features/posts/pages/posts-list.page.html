<div class="max-w-4xl mx-auto">

  <h1 class="text-3xl font-bold mb-6">Posts</h1>

  <!-- Search -->
  <input
    type="text"
    placeholder="Search by title..."
    class="w-full p-2 mb-4 border rounded-lg"
    (input)="search.set($any($event.target).value)"
  />

  <!-- Loading -->
  <div *ngIf="loading()" class="text-blue-600 mb-4">
    Loading posts...
  </div>

  <!-- Error -->
  <div *ngIf="error()" class="text-red-600 mb-4">
    {{ error() }}
  </div>

  <!-- Empty state -->
  <div *ngIf="!loading() && filteredPosts().length === 0">
    No posts found.
  </div>

  <!-- Posts -->
  <div class="space-y-4">
    <div *ngFor="let post of filteredPosts()"
      class="bg-white p-4 shadow rounded-lg">

      <h2 class="text-xl font-semibold">{{ post.title }}</h2>
      <p class="text-sm text-gray-500">
        {{ post.author }} • {{ post.createdAt | date:'short' }}
      </p>

      <div class="flex gap-3 mt-3">
        <button class="text-blue-600 hover:underline">View</button>
        <button class="text-yellow-600 hover:underline">Edit</button>
        <button class="text-red-600 hover:underline">Delete</button>
      </div>

    </div>
  </div>

  <!-- Pagination -->
  <div class="flex justify-between mt-6">

    <button
      (click)="prevPage()"
      [disabled]="page() === 1"
      class="px-4 py-2 bg-gray-300 rounded disabled:opacity-50">
      Previous
    </button>

    <span>Page {{ page() }} of {{ totalPages() }}</span>

    <button
      (click)="nextPage()"
      [disabled]="page() === totalPages()"
      class="px-4 py-2 bg-blue-600 text-white rounded disabled:opacity-50">
      Next
    </button>

  </div>

</div>
