<div class="max-w-4xl mx-auto">

  <div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold">Posts</h1>

    <a routerLink="/posts/new" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
      + Create Post
    </a>
  </div>

  <!-- Search -->
  <input type="text" placeholder="Search by title..." class="w-full p-2 mb-4 border rounded-lg"
    (input)="search.set($any($event.target).value)" />

  <!-- Loading -->
  <div *ngIf="loading()" class="text-blue-600 mb-4">
    Loading posts...
  </div>

  <!-- Error -->
  <div *ngIf="error()" class="text-red-600 mb-4">
    {{ error() }}
  </div>

  <!-- Empty state -->
  <div *ngIf="!loading() && filteredPosts().length === 0">
    No posts found.
  </div>

  <app-data-table [columns]="columns" [data]="filteredPosts()" [actions]="actions"
    (actionClicked)="handleAction($event)">
  </app-data-table>

  <app-pagination [page]="page()" [totalPages]="totalPages()" (pageChange)="onPageChange($event)">
  </app-pagination>

</div>
